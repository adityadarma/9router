name: CI

# Runs code checks, lint, and tests automatically on every push to the
# limit-token branch (and on pull requests targeting main/master/limit-token).
on:
  push:
    branches:
      - limit-token
  pull_request:
    branches:
      - main
      - master
      - limit-token
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (code check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # This repo intentionally does not commit package-lock.json (.gitignore),
      # so use `npm install` rather than `npm ci` (which requires a lockfile).
      - name: Install dependencies
        run: npm install

      - name: Build (Next.js)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # The repository currently carries pre-existing lint findings, so lint is
      # reported but does not fail the pipeline. Remove continue-on-error once
      # the backlog is cleared to make lint blocking.
      - name: Run ESLint
        run: npx eslint .
        continue-on-error: true

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Tests resolve aliases into ../src and ../open-sse, so the root deps
      # must be present alongside the tests workspace deps.
      - name: Install root dependencies
        run: npm install

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      # Exclude live/cloud suites that require network access or provider
      # credentials and would be flaky in CI.
      #
      # NOTE: continue-on-error is set because this repository currently carries
      # pre-existing test failures (e.g. rtk, translator, oauth suites) that are
      # unrelated to recent changes. Results are reported but do not block the
      # pipeline. Remove continue-on-error once the existing failures are fixed
      # to make tests blocking.
      - name: Run tests
        working-directory: tests
        run: npx vitest run --reporter=dot --exclude "**/*.live.test.js" --exclude "**/*.cloud.test.js"
        continue-on-error: true
